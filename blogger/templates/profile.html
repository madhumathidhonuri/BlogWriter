<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color:cadetblue;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color:#880d5d;
            padding: 20px 20px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color:gold;
        }
        .card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin: 0 auto;
        }
        .card h3 {
            color: #333;
        }
        .card p {
            color: #555;
        }
        .card strong {
            color: #333;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'blog' %}">Home</a>
        <a href="{% url 'profile' %}">Profile</a>
        <a href="{% url 'logout' %}">Logout</a>
    </nav>

    <div class="container">
        <h1>Your Profile</h1>
        <div class="card">
            <h3>{{ user.username }}'s Profile</h3>
            <p><strong>Email:</strong> {{ user.email }}</p>
            <p><strong>Joined:</strong> {{ user.date_joined }}</p>
            <p><strong>Last Login:</strong> {{ user.last_login }}</p>
        </div>
    </div>
</body>
</html>
